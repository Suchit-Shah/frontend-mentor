<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="pic">
            <picture>
                <source media="(max-width: 37rem)" srcset="./images/image-product-mobile.jpg">
                <img src="./images/image-product-desktop.jpg" alt="Gabrielle Essence">
            </picture>
        </div>
        <div class="text">
            <div class="type">
                PERFUME
            </div>
            <div class="name">
                Gabrielle Essence Eau De Parfum
            </div>
            <div class="description">
                A floral, solar and voluptous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL
            </div>
            <div class="price">
                <div class="dprice">
                    $149.99
                </div>
                <div class="oprice">
                    $169.99
                </div>
            </div>
            <a>
                <div class="logo">
                    <img src="./images/icon-cart.svg">
                </div>
                <div class="cart">
                    Add to Cart
                </div>
            </a>
        </div>
    </div>
</body>
</html>
