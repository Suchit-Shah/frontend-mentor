<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="left">
      <div class="l_title">
        Your Result
      </div>
      <div class="circle">
        <div class="marks">
          76
        </div>
        <div class="total">
          of 100
        </div>
      </div>
      <div class="head">
        Great
      </div>
      <div class="body">
        You scored higher than 65% of the people who have taken these tests
      </div>
    </div>
    <div class="right">
      <div class="r_title">
        Summary
      </div>
      <div class="bar">
        <div class="comp red" style="margin-top: 0;">
          <div class="img">
            <img src="./images/icon-reaction.svg" alt="img">
          </div>
          <div class="sub tred">
            Reaction
          </div>
          <div class="gain">
            80
          </div>
          <div class="slash">
            /
          </div>
          <div class="outOf">
            100
          </div>
        </div>
        <div class="comp yellow">
          <div class="img">
            <img src="./images/icon-memory.svg" alt="img">
          </div>
          <div class="sub tyellow">
            Memory
          </div>
          <div class="gain">
            92
          </div>
          <div class="slash">
            /
          </div>
          <div class="outOf">
            100
          </div>        
        </div>
        <div class="comp green">
          <div class="img">
            <img src="./images/icon-verbal.svg" alt="img">
          </div>
          <div class="sub tgreen">
            Verbal
          </div>
          <div class="gain">
            61
          </div>
          <div class="slash">
            /
          </div>
          <div class="outOf">
            100
          </div>
        </div>
        <div class="comp blue" style="margin-bottom: 0;">
          <div class="img">
            <img src="./images/icon-visual.svg" alt="img">
          </div>
          <div class="sub tblue">
            Visual
          </div>
          <div class="gain">
            73
          </div>
          <div class="slash">
            /
          </div>
          <div class="outOf">
            100
          </div>
        </div>
      </div>
      <a>
        <div class="btn">
          Continue
        </div>
      </a>
    </div>
  </div>
</body>
</html>
