<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="bg">
      <img src="./images/drawers.jpg" id="bg">
    </div>
    <div class="text">
      <div class="head">
        Shift the overall look and feel by adding these wonderful 
        touches to furniture in your home
      </div>
      <div class="info">
        Ever been in a room and felt like something was missing? Perhaps 
        it felt slightly bare and uninviting. I've got some simple tips 
        to help you make any room feel complete.
      </div>
      <div class="profile">
        <div class="pic">
          <img src="./images/avatar-michelle.jpg">
        </div>
        <div class="data">
          <div class="name">
            Michelle Appleton
          </div>
          <div class="date">
            28 Jun 2020
          </div>
        </div>
        <div class="share">
          <img src="./images/icon-share.svg" class="share-icon">
          <div class="popup">
            <span class="share-text">SHARE</span>
            <img src="./images/icon-facebook.svg" alt="facebook">
            <img src="./images/icon-twitter.svg" alt="twitter">
            <img src="./images/icon-pinterest.svg" alt="pinterest">
            <div class="arrow"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
