<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>
<body>
    <img src="./images/bg-pattern-top.svg" id="i1">
    <img src="./images/bg-pattern-bottom.svg" id="i2">
    <div class="card">
        <div class="bg">
            <img src="./images/bg-pattern-card.svg" id="i3">
        </div>
        <div class="text">
            <img src="./images/image-victor.jpg" id="i4">
            <div class="age">
                Victor Crest <span>26</span>
            </div>
            <div class="place">
                London
            </div>
            <hr>
            <div class="stats">
                <div class="d">
                    <div class="like">
                        80K
                    </div>
                    <div class="data">
                        Followers
                    </div>
                </div>
                <div class="d">
                    <div class="like">
                        803K
                    </div>
                    <div class="data">
                        Likes
                    </div>
                </div>
                <div class="d">
                    <div class="like">
                        1.4K
                    </div>
                    <div class="data">
                        Photos
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
