<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="img">
            <img src="./images/illustration-hero.svg" id="i1">
        </div>
        <div class="text">
            <div class="title">
                Order Summary
            </div>
            <div class="description">
                You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!
            </div>
            <div class="bar">
                <div class="logo">
                    <img src="./images/icon-music.svg" id="i2">
                </div>
                <div class="vertical">
                    <div class="v1">
                        Annual Plan
                    </div>
                    <div class="v2">
                        $59.99/year
                    </div>
                </div>
                <div class="change">
                    <a href="#" id="a1">Change</a>
                </div>
            </div>
            <a>
                <div class="button">
                    Procced to Payment
                </div>
            </a>
            <div class="cancel">
                Cancel Order
            </div>
        </div>
    </div>
</body>
</html>
