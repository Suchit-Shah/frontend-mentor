<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="img">
            <img src="./images/image-equilibrium.jpg" id="i1">
            <div class="overlay">
                <img src="./images/icon-view.svg" id="i11">
            </div>
        </div>
        <div class="title">
            Equilibrium #3429
        </div>
        <div class="description">
            Our Equilibrium collection promotes balance and calm
        </div>
        <div class="info">
            <div class="ldata">
                <img src="./images/icon-ethereum.svg">
            </div>
            <div class="data">
                0.041 ETH
            </div>
            <div class="ltime">
                <img src="./images/icon-clock.svg">
            </div>
            <div class="time">
                3 days left
            </div>
        </div>
        <hr>
        <div class="profile">
            <div class="pic">
                <img src="./images/image-avatar.png" id="i2">
            </div>
            <div class="name">
                Creation of <span>Jules Wyvern</span>
            </div>
        </div>
    </div>
</body>
</html>
